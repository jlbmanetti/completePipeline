# Airflow (Phase 2) — Docker Compose
# Run from project root: docker compose -f docker-compose.airflow.yaml up -d
#
# Prerequisites: Docker Desktop running. Airbyte already running on host (e.g. abctl)
# so Airflow can trigger syncs at http://host.docker.internal:8000

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - airflow_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airflow"]
      interval: 5s
      retries: 5

  airflow-webserver:
    image: apache/airflow:2.10.3
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__WEBSERVER__EXPOSE_CONFIG: "false"
      AIRFLOW__WEBSERVER__SECRET_KEY: ${AIRFLOW_WEBSERVER_SECRET_KEY:-airflow-webserver-secret-key-same-on-all-containers}
      AIRFLOW__API__AUTH_BACKENDS: "airflow.api.auth.backend.basic_auth"
      # Pin to 2.10-compatible versions (airbyte 5.x pulls Airflow 3.x and breaks CLI)
      _PIP_ADDITIONAL_REQUIREMENTS: "apache-airflow-providers-amazon==8.16.0 apache-airflow-providers-airbyte==4.0.0"
      # Windows: use 0 to avoid volume permission issues; Linux/Mac use 50000
      AIRFLOW_UID: ${AIRFLOW_UID:-0}
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./data:/opt/airflow/data
    ports:
      - "8080:8080"
    command: webserver
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  airflow-scheduler:
    image: apache/airflow:2.10.3
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__WEBSERVER__SECRET_KEY: ${AIRFLOW_WEBSERVER_SECRET_KEY:-airflow-webserver-secret-key-same-on-all-containers}
      # Pin to 2.10-compatible versions (airbyte 5.x pulls Airflow 3.x and breaks CLI)
      _PIP_ADDITIONAL_REQUIREMENTS: "apache-airflow-providers-amazon==8.16.0 apache-airflow-providers-airbyte==4.0.0"
      AIRFLOW_UID: ${AIRFLOW_UID:-0}
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./data:/opt/airflow/data
    command: scheduler

volumes:
  airflow_postgres_data:
